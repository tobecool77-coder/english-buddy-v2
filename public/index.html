<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>English Speaking Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#4A5BE8;--blue-dark:#3347CC;--blue-light:#E8EBFF;
  --mint:#22C9D8;--orange:#FF6B35;--yellow:#FFD23F;
  --green:#2ECC71;--red:#E74C3C;
  --bg:#F0F2FF;--white:#FFFFFF;--text:#1A1F5E;--sub:#6B7280;
  --shadow:0 4px 20px rgba(74,91,232,0.15);--radius:20px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text)}
.screen{display:none;width:100%;height:100%;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(26,31,94,.9);color:#fff;padding:10px 22px;border-radius:30px;
  font-size:.85rem;font-weight:700;opacity:0;transition:all .3s;z-index:9999;
  pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOGIN ── */
#loginScreen{
  background:linear-gradient(150deg,#3347CC 0%,#4A5BE8 45%,#22C9D8 100%);
  align-items:center;justify-content:center;padding:16px;position:relative;overflow:hidden;
}
.bg-circle{position:absolute;border-radius:50%;opacity:.08;pointer-events:none}
.bg-circle.c1{width:300px;height:300px;background:#fff;top:-80px;right:-60px}
.bg-circle.c2{width:200px;height:200px;background:#fff;bottom:-40px;left:-40px}
.login-card{
  background:#fff;border-radius:28px;padding:28px 24px;
  width:100%;max-width:440px;box-shadow:0 24px 60px rgba(0,0,0,.2);
  position:relative;z-index:1;max-height:calc(100vh - 32px);overflow-y:auto;
}
.brand{text-align:center;margin-bottom:22px}
.brand-robot{
  width:80px;height:80px;margin:0 auto 10px;
  background:linear-gradient(135deg,var(--blue),var(--mint));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:38px;box-shadow:0 8px 24px rgba(74,91,232,.35);
  animation:roboPulse 2.5s ease-in-out infinite;
}
@keyframes roboPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.brand-title{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--text);line-height:1.1}
.brand-sub{font-size:.82rem;color:var(--sub);margin-top:3px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-grid-1{margin-bottom:12px}
.form-label{display:block;font-size:.72rem;font-weight:900;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-input,.form-select{
  width:100%;padding:11px 13px;border:2.5px solid #D1D5F5;border-radius:12px;
  font-size:.95rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);
  background:#F8F9FF;outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s;
}
.form-input:focus,.form-select:focus{border-color:var(--blue);background:#fff}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--blue);font-size:.85rem;pointer-events:none}
.start-wrap{display:flex;justify-content:center;margin-top:16px}
.start-btn{
  width:82px;height:82px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--mint));color:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  box-shadow:0 8px 28px rgba(74,91,232,.4);transition:transform .2s;
}
.start-btn:active{transform:scale(.95)}
.start-btn .icon{font-size:1.7rem}
.start-btn .label{font-family:'Fredoka One',cursive;font-size:.8rem}

/* ── CHAT ── */
#chatScreen{background:var(--bg)}
.chat-header{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue));
  padding:10px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,.15);
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-avatar{width:40px;height:40px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}
.hdr-name{font-family:'Fredoka One',cursive;color:#fff;font-size:1rem}
.hdr-status{font-size:.7rem;color:rgba(255,255,255,.8);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:6px}
.badge{padding:4px 10px;border-radius:20px;font-size:.73rem;font-weight:800}
.badge-phase{background:rgba(255,255,255,.2);color:#fff}
.badge-turn{background:var(--yellow);color:#333}

/* Timer bar */
.timer-bar{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue));
  padding:6px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;display:none;
}
.timer-bar.show{display:flex}
.timer-label{color:rgba(255,255,255,.9);font-size:.78rem;font-weight:700}
.timer-num{font-family:'Fredoka One',cursive;color:var(--yellow);font-size:1.1rem}
.timer-track{flex:1;height:6px;background:rgba(255,255,255,.2);border-radius:3px;margin:0 12px;overflow:hidden}
.timer-fill{height:100%;background:var(--yellow);border-radius:3px;transition:width 1s linear}

.messages{flex:1;overflow-y:auto;padding:12px 14px 6px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.ai{flex-direction:row}
.msg-row.student{flex-direction:row-reverse}
.msg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.msg-av.ai-av{background:linear-gradient(135deg,var(--blue),var(--mint))}
.msg-av.st-av{background:linear-gradient(135deg,var(--orange),var(--yellow))}
.bubble{max-width:72%;padding:10px 14px;border-radius:18px;font-size:.93rem;font-weight:600;line-height:1.5}
.bubble.ai{background:#fff;color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.bubble.student{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border-bottom-right-radius:4px}
.bubble-time{font-size:.63rem;opacity:.5;margin-top:3px}
.typing-row{display:flex;align-items:flex-end;gap:8px}
.typing-bubble{background:#fff;border-radius:18px;border-bottom-left-radius:4px;padding:12px 16px;display:flex;gap:5px;align-items:center;box-shadow:var(--shadow)}
.dot{width:7px;height:7px;background:var(--blue);border-radius:50%;animation:dotBounce 1.1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.1);opacity:1}}

.phase-banner{
  margin:6px 14px;padding:10px 14px;border-radius:12px;
  font-size:.82rem;font-weight:800;text-align:center;display:none;
}
.phase-banner.show{display:block}
.phase-banner.smalltalk{background:#E8F5E9;color:#2E7D32;border:2px solid #A5D6A7}
.phase-banner.lesson{background:#E3F2FD;color:#1565C0;border:2px solid #90CAF9}
.phase-banner.free{background:#FFF3E0;color:#E65100;border:2px solid #FFCC80}

.interim-bar{
  padding:7px 16px;font-size:.86rem;font-style:italic;color:var(--blue);
  background:rgba(74,91,232,.07);min-height:34px;flex-shrink:0;
  border-left:3px solid var(--blue);margin:0 14px 4px;border-radius:0 8px 8px 0;
}
.scaffold-bar{display:none;margin:0 14px 6px;padding:9px 14px;background:linear-gradient(135deg,#FFF8E1,#FFECB3);border:2px solid var(--yellow);border-radius:12px;font-size:.83rem;font-weight:700;color:#5D4037;flex-shrink:0}
.scaffold-bar.show{display:block}

.voice-panel{padding:10px 16px 16px;background:#fff;border-top:1px solid #E8EBFF;flex-shrink:0;box-shadow:0 -3px 16px rgba(0,0,0,.06)}
.voice-hint{text-align:center;font-size:.78rem;font-weight:700;color:var(--sub);margin-bottom:8px;min-height:18px}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:26px;margin-bottom:6px}
.wbar{width:4px;background:var(--blue);border-radius:4px;height:4px;transition:height .1s}
.wave.active .wbar{animation:waveAnim 1s ease-in-out infinite}
.wbar:nth-child(1){animation-delay:0s}.wbar:nth-child(2){animation-delay:.1s}.wbar:nth-child(3){animation-delay:.2s}.wbar:nth-child(4){animation-delay:.3s}.wbar:nth-child(5){animation-delay:.2s}.wbar:nth-child(6){animation-delay:.1s}.wbar:nth-child(7){animation-delay:0s}
@keyframes waveAnim{0%,100%{height:4px}50%{height:22px}}
.mic-btn{
  width:68px;height:68px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--mint));color:#fff;font-size:1.7rem;
  display:flex;align-items:center;justify-content:center;margin:0 auto;
  box-shadow:0 6px 22px rgba(74,91,232,.4);transition:transform .15s;
  -webkit-user-select:none;user-select:none;
}
.mic-btn:active{transform:scale(.93)}
.mic-btn.listening{background:linear-gradient(135deg,var(--red),#FF8A65);animation:micPulse 1.2s ease-in-out infinite}
.mic-btn.disabled{background:#CFD8DC;box-shadow:none;cursor:not-allowed;opacity:.7}
@keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,.5)}70%{box-shadow:0 0 0 18px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.mic-label{text-align:center;font-size:.7rem;color:var(--sub);margin-top:5px;font-weight:700}
.btn-row{display:flex;justify-content:center;gap:10px;margin-top:8px}
.action-btn{
  padding:8px 18px;border-radius:20px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.8rem;
  transition:transform .15s;display:none;
}
.action-btn.show{display:block}
.action-btn.retry{background:var(--blue-light);color:var(--blue-dark)}
.action-btn.end-lesson{background:linear-gradient(135deg,var(--green),#27AE60);color:#fff;box-shadow:0 4px 12px rgba(46,204,113,.35)}
.action-btn.end-free{background:linear-gradient(135deg,var(--orange),#FF4500);color:#fff;box-shadow:0 4px 12px rgba(255,107,53,.35)}
.action-btn:active{transform:scale(.95)}

/* ── COMIC LOADING ── */
#comicLoadingScreen{
  background:linear-gradient(150deg,#1A1F5E,#3347CC,#4A5BE8);
  align-items:center;justify-content:center;padding:20px;text-align:center;
}
.loading-inner{color:#fff;max-width:340px}
.loading-emoji{font-size:72px;animation:drawing 1.5s ease-in-out infinite}
@keyframes drawing{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.1)}}
.loading-title{font-family:'Fredoka One',cursive;font-size:1.7rem;margin:12px 0 6px}
.loading-sub{font-size:.92rem;opacity:.85;margin-bottom:24px}
.loading-track{background:rgba(255,255,255,.15);border-radius:10px;height:9px;overflow:hidden}
.loading-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--yellow));border-radius:10px;animation:loadFill 3s ease-in-out infinite}
@keyframes loadFill{0%{width:8%}50%{width:88%}100%{width:8%}}

/* ── COMIC SCREEN ── */
#comicScreen{background:linear-gradient(150deg,#E8EBFF,#E0FAFA)}
.comic-header{background:linear-gradient(135deg,var(--blue-dark),var(--blue));padding:12px 16px;text-align:center;color:#fff;flex-shrink:0}
.comic-header-title{font-family:'Fredoka One',cursive;font-size:1.25rem}
.comic-header-sub{font-size:.76rem;opacity:.85;margin-top:2px}
.comic-body{flex:1;overflow-y:auto;padding:12px 12px 20px}
.comic-title-card{background:#fff;border-radius:14px;padding:10px 16px;margin-bottom:12px;text-align:center;box-shadow:var(--shadow)}
.comic-title{font-family:'Fredoka One',cursive;font-size:1.15rem;color:var(--text)}
.comic-student{font-size:.76rem;color:var(--sub);margin-top:3px}
.comic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}

/* Comic panel */
.comic-panel{
  background:#fff;border-radius:16px;overflow:hidden;
  border:3px solid #C5CAE9;box-shadow:var(--shadow);
  animation:panelIn .4s ease forwards;opacity:0;
}
.comic-panel:nth-child(1){animation-delay:.05s}
.comic-panel:nth-child(2){animation-delay:.12s}
.comic-panel:nth-child(3){animation-delay:.19s}
.comic-panel:nth-child(4){animation-delay:.26s}
@keyframes panelIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.panel-header{background:var(--blue);color:#fff;font-size:.75rem;font-weight:800;padding:4px 10px;display:flex;justify-content:space-between;align-items:center}
.panel-setting{font-size:.65rem;opacity:.8}

.countdown-card{background:#fff;border-radius:14px;padding:14px 16px;text-align:center;box-shadow:var(--shadow);margin-bottom:12px}
.cd-title{font-size:.82rem;font-weight:700;color:var(--sub);margin-bottom:5px}
.cd-number{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--blue);line-height:1}
.cd-label{font-size:.75rem;color:var(--sub);margin-top:3px}
.cd-track{height:8px;background:#E8EBFF;border-radius:4px;margin-top:8px;overflow:hidden}
.cd-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--mint));border-radius:4px;transition:width 1s linear}

.r2-btn{
  width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,var(--orange),#FF4500);color:#fff;
  font-family:'Fredoka One',cursive;font-size:1rem;
  box-shadow:0 6px 20px rgba(255,107,53,.4);display:none;margin-bottom:12px;transition:transform .15s;
}
.r2-btn.show{display:block}
.r2-btn:active{transform:scale(.97)}
.free-btn{
  width:100%;padding:14px;border:none;border-radius:14px;cursor:pointer;
  background:linear-gradient(135deg,var(--green),#27AE60);color:#fff;
  font-family:'Fredoka One',cursive;font-size:1rem;
  box-shadow:0 6px 20px rgba(46,204,113,.4);display:none;margin-bottom:12px;transition:transform .15s;
}
.free-btn.show{display:block}
.free-btn:active{transform:scale(.97)}
.complete-card{background:linear-gradient(135deg,#E8F5E9,#F3E5F5);border-radius:18px;padding:20px 16px;text-align:center;border:2.5px solid #C8E6C9;display:none}
.complete-card.show{display:block}
.complete-emoji{font-size:52px;margin-bottom:10px}
.complete-title{font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--text);margin-bottom:6px}
.complete-sub{font-size:.86rem;color:var(--sub);line-height:1.6}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div class="screen active" id="loginScreen">
  <div class="bg-circle c1"></div><div class="bg-circle c2"></div>
  <div class="login-card">
    <div class="brand">
      <div class="brand-robot">🤖</div>
      <div class="brand-title">English Speaking Buddy</div>
      <div class="brand-sub">AI 영어 말하기 연습</div>
    </div>
    <div class="form-grid-3">
      <div>
        <label class="form-label">학년</label>
        <div class="select-wrap">
          <select class="form-select" id="grade" onchange="onGradeChange()">
            <option value="">-</option>
            <option value="6">6학년</option>
          </select>
        </div>
      </div>
      <div>
        <label class="form-label">반</label>
        <div class="select-wrap">
          <select class="form-select" id="classNum">
            <option value="">-</option>
            <option value="1">1반</option><option value="2">2반</option>
            <option value="3">3반</option><option value="4">4반</option>
            <option value="5">5반</option><option value="6">6반</option>
          </select>
        </div>
      </div>
      <div>
        <label class="form-label">번호</label>
        <input type="number" class="form-input" id="number" placeholder="00" min="1" max="40">
      </div>
    </div>
    <div class="form-grid-1">
      <label class="form-label">이름</label>
      <input type="text" class="form-input" id="name" placeholder="이름을 입력하세요">
    </div>
    <div class="form-grid-1">
      <label class="form-label">오늘의 단원</label>
      <div class="select-wrap">
        <select class="form-select" id="lessonSelect">
          <option value="">먼저 학년을 선택하세요</option>
        </select>
      </div>
    </div>
    <div class="start-wrap">
      <button class="start-btn" onclick="startSession()">
        <span class="icon">🎤</span><span class="label">시작!</span>
      </button>
    </div>
  </div>
</div>

<!-- CHAT -->
<div class="screen" id="chatScreen">
  <div class="chat-header">
    <div class="hdr-left">
      <div class="hdr-avatar">🤖</div>
      <div>
        <div class="hdr-name">Alex</div>
        <div class="hdr-status" id="hdrStatus">Ready!</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="badge badge-phase" id="phaseBadge">인사</div>
      <div class="badge badge-turn" id="turnBadge" style="display:none"></div>
    </div>
  </div>
  <div class="timer-bar" id="timerBar">
    <span class="timer-label" id="timerLabel">연습 시간</span>
    <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <span class="timer-num" id="timerNum">1:30</span>
  </div>
  <div class="phase-banner" id="phaseBanner"></div>
  <div class="messages" id="messages"></div>
  <div class="interim-bar" id="interimBar">말해보세요...</div>
  <div class="scaffold-bar" id="scaffoldBar"></div>
  <div class="voice-panel">
    <div class="voice-hint" id="voiceHint">마이크 버튼을 눌러 말해보세요</div>
    <div class="wave" id="wave">
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <div class="mic-label" id="micLabel">버튼을 누르고 영어로 말하세요</div>
    <div class="btn-row">
      <button class="action-btn retry" id="retryBtn" onclick="retryMic()">다시 말하기</button>
      <button class="action-btn end-free" id="endFreeBtn" onclick="userEndFreetalk()">Bye! 그만할게요</button>
    </div>
  </div>
</div>

<!-- COMIC LOADING -->
<div class="screen" id="comicLoadingScreen">
  <div class="loading-inner">
    <div class="loading-emoji">🎨</div>
    <div class="loading-title">만화를 그리고 있어요!</div>
    <div class="loading-sub">잠시만 기다려 주세요</div>
    <div class="loading-track"><div class="loading-fill"></div></div>
  </div>
</div>

<!-- COMIC -->
<div class="screen" id="comicScreen">
  <div class="comic-header">
    <div class="comic-header-title" id="comicHdrTitle">My English Comic!</div>
    <div class="comic-header-sub" id="comicHdrSub">오늘의 대화를 만화로 만들었어요</div>
  </div>
  <div class="comic-body">
    <div class="comic-title-card">
      <div class="comic-title" id="comicTitle">My English Story</div>
      <div class="comic-student" id="comicStudentInfo"></div>
    </div>
    <div class="comic-grid" id="comicGrid"></div>
    <div class="countdown-card" id="cdCard">
      <div class="cd-title" id="cdTitle">만화를 읽으면서 복습해 보세요!</div>
      <div class="cd-number" id="cdNum">60</div>
      <div class="cd-label" id="cdLabel">초 후에 Round 2가 시작됩니다</div>
      <div class="cd-track"><div class="cd-fill" id="cdFill" style="width:100%"></div></div>
    </div>
    <button class="r2-btn" id="r2Btn" onclick="startRound2()">Round 2 시작! Let's Go Again!</button>
    <button class="free-btn" id="freeBtn" onclick="beginFreetalk()">자유 연습 시작하기</button>
    <div class="complete-card" id="completeCard">
      <div class="complete-emoji">🎉</div>
      <div class="complete-title">오늘 연습 완료!</div>
      <div class="complete-sub">정말 잘 했어요!<br>Great job today!</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  LESSON DATA
// ═══════════════════════════════════════════════
const LESSONS = {
  6:[

// 말풍선 (텍스트 자동 줄바꿈)
function speechBubble(x, y, w, text, side, color, textColor) {
  if (!text) return '';
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  const maxChars = Math.floor(w / 6.5);
  words.forEach(word => {
    if ((cur + ' ' + word).trim().length > maxChars) {
      if (cur) lines.push(cur.trim());
      cur = word;
    } else {
      cur = (cur + ' ' + word).trim();
    }
  });
  if (cur) lines.push(cur.trim());

  const lineH = 13;
  const bh = lines.length * lineH + 10;
  const bw = Math.min(w, Math.max(...lines.map(l => l.length)) * 6.5 + 14);
  const bx = side === 'left' ? x : x - bw;
  const tailX = side === 'left' ? bx + 12 : bx + bw - 12;

  return `
    <rect x="${bx}" y="${y}" width="${bw}" height="${bh}" rx="8" fill="${color}" stroke="${textColor}" stroke-width="1.2" opacity=".97"/>
    <polygon points="${tailX},${y+bh} ${tailX+(side==='left'?-6:6)},${y+bh+8} ${tailX+(side==='left'?8:-8)},${y+bh}" fill="${color}"/>
    ${lines.map((l,i) => `<text x="${bx+bw/2}" y="${y+10+i*lineH+3}" text-anchor="middle" font-size="8.5" font-weight="700" fill="${textColor}" font-family="Nunito,Arial,sans-serif">${l}</text>`).join('')}
  `;
}

function onGradeChange() {
  const grade = parseInt(document.getElementById('grade').value);
  const sel = document.getElementById('lessonSelect');
  sel.innerHTML = '';
  if (!grade) { sel.innerHTML = '<option value="">먼저 학년을 선택하세요</option>'; return; }
  (LESSONS[grade]||[]).forEach(l => {
    const o = document.createElement('option');
    o.value = l.key; o.textContent = l.title; sel.appendChild(o);
  });
}

function startSession() {
  const grade    = document.getElementById('grade').value;
  const classNum = document.getElementById('classNum').value;
  const number   = document.getElementById('number').value.trim();
  const name     = document.getElementById('name').value.trim();
  const sel      = document.getElementById('lessonSelect');
  const lessonKey = sel.value;
  const lessonTitle = sel.options[sel.selectedIndex]?.text || '';
  if (!grade||!classNum||!number||!name||!lessonKey) { toast('모든 항목을 입력해 주세요!'); return; }

  S.student = {grade, classNum, number, name};
  S.lessonKey = lessonKey; S.lessonTitle = lessonTitle;
  S.round = 1; S.phase = 'lesson'; S.smalltalkCount = 0;
  S.sessionId = `${grade}-${classNum}-${number}-${name}-${Date.now()}`;
  S.sessionStart = Date.now();
  S.history = []; S.turns = []; S.studentTurnCount = 0;
  S.lessonHistory = [];

  // 모바일 TTS unlock — 사용자 버튼 클릭 시점에 실행
  if (window.speechSynthesis) {
    const unlock = new SpeechSynthesisUtterance('');
    unlock.volume = 0;
    window.speechSynthesis.speak(unlock);
  }

  showScreen('chatScreen');
  updatePhaseUI();
  document.getElementById('endFreeBtn').classList.remove('show');
  initSpeech();
  const firstOpener = LESSON_OPENERS[S.lessonKey] || "Let's practice English!";
  setTimeout(() => aiSpeak(firstOpener), 600);
}

function updatePhaseUI() {
  const banner = document.getElementById('phaseBanner');
  const phaseBadge = document.getElementById('phaseBadge');
  const turnBadge = document.getElementById('turnBadge');
  const timerBar = document.getElementById('timerBar');

  banner.className = 'phase-banner';
  banner.classList.remove('show');
  timerBar.classList.remove('show');
  turnBadge.style.display = 'none';
  document.getElementById('endFreeBtn').classList.remove('show');

  if (S.phase === 'smalltalk') {
    phaseBadge.textContent = '인사';
    document.getElementById('hdrStatus').textContent = '스몰톡 중...';
  } else if (S.phase === 'lesson') {
    phaseBadge.textContent = `Round ${S.round}`;
    document.getElementById('hdrStatus').textContent = S.lessonTitle.split('·')[1]?.trim() || S.lessonTitle;
    banner.classList.add('lesson','show');
    banner.textContent = `오늘 배운 걸 연습해 보자! Let's practice today's lesson!`;
    timerBar.classList.add('show');
    turnBadge.style.display = 'block';
    startLessonTimer(90); // 1분 30초
  } else if (S.phase === 'free') {
    phaseBadge.textContent = '자유 연습';
    document.getElementById('hdrStatus').textContent = '자유롭게 대화해요!';
    banner.classList.add('free','show');

}

function startLessonTimer(seconds) {
  if (S.lessonTimer) clearInterval(S.lessonTimer);
  S.lessonTimerSec = seconds;
  S.lessonTimerTotal = seconds;
  updateTimerDisplay();
  S.lessonTimer = setInterval(() => {
    S.lessonTimerSec--;
    updateTimerDisplay();

      clearInterval(S.lessonTimer);
      S.lessonTimer = null;
      // Auto end lesson when timer runs out
      if (S.phase === 'lesson') userEndLesson();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(S.lessonTimerSec / 60);
  const s = S.lessonTimerSec % 60;
  document.getElementById('timerNum').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  const pct = Math.max(0, (S.lessonTimerSec / S.lessonTimerTotal) * 100);
  document.getElementById('timerFill').style.width = pct + '%';
  const label = S.round === 1 ? `연습 시간 · Round ${S.round} (1분 30초)` : `연습 시간 · Round ${S.round} (1분 30초)`;
  document.getElementById('timerLabel').textContent = label;

// ═══════════════════════════════════════════════
//  SPEECH RECOGNITION
// ═══════════════════════════════════════════════
function initSpeech() {
  destroySpeech();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    toast('Chrome 브라우저를 사용해 주세요!');
    document.getElementById('voiceHint').textContent = '⚠️ 음성 인식 미지원 브라우저입니다';
    return;
  }
  const r = new SR();
  r.lang = 'en-US';
  r.continuous = false;      // Android: true면 onend가 안 올 수 있음
  r.interimResults = false;  // Android: interim 끄면 결과 안정성 ↑
  r.maxAlternatives = 1;     // 단순하게

  r.onstart = () => {
    S.recActive = true;
    S.gotFinal = false;
    S.speechStartAt = Date.now();
    setMicUI('listening');
    document.getElementById('voiceHint').textContent = '듣고 있어요... 말하고 멈추세요!';
    document.getElementById('wave').classList.add('active');
    document.getElementById('interimBar').textContent = '🎤 말하고 멈추면 자동으로 인식해요';
    document.getElementById('retryBtn').classList.remove('show');
    clearScaffold();
  };

  r.onresult = (e) => {
    // interimResults=false → 무조건 final 결과
    const transcript = (e.results[0]?.[0]?.transcript || '').trim();
    if (!transcript) return;
    const filtered = bestTranscript(e.results[0]);
    if (!filtered) return;
    S.gotFinal = true;
    document.getElementById('interimBar').textContent = '✅ ' + filtered;
    handleStudentSpeech(filtered);
  };

  r.onend = () => {
    S.recActive = false;
    document.getElementById('wave').classList.remove('active');
    if (!S.aiThinking) {
      setMicUI('idle');
      if (!S.gotFinal) {
        document.getElementById('voiceHint').textContent = '잘 안 들렸어요. 다시 눌러보세요!';
        document.getElementById('retryBtn').classList.add('show');
      }
    }
  };

  r.onerror = (e) => {
    S.recActive = false;
    document.getElementById('wave').classList.remove('active');
    // aborted는 정상 취소 — 에러 표시 안 함
    if (e.error === 'aborted') return;
    setMicUI('idle');
    const msgs = {
      'no-speech':           '소리가 없었어요. 다시 눌러보세요!',
      'not-allowed':         '마이크 권한을 허용해 주세요! (설정 → Chrome → 마이크)',
      'service-not-allowed': '마이크 권한을 허용해 주세요!',
      'network':             '네트워크 오류! 인터넷을 확인해 주세요.',
      'audio-capture':       '마이크를 찾을 수 없어요!',
    };
    document.getElementById('voiceHint').textContent = msgs[e.error] || '오류: ' + e.error + ' — 다시 눌러보세요!';
    document.getElementById('retryBtn').classList.add('show');
    console.warn('[STT error]', e.error);
  };

  S.recognition = r;
}

function destroySpeech() {
  if (S.recognition) {
    // 이벤트 핸들러 먼저 제거 → onend 재귀 방지
    S.recognition.onstart = null;
    S.recognition.onresult = null;
    S.recognition.onend = null;
    S.recognition.onerror = null;
    try { S.recognition.abort(); } catch(e) {}
    S.recognition = null;
    S.recActive = false;
  }
}

function bestTranscript(result) {
  const transcript = (result[0]?.transcript || '').trim();
  const lower = transcript.toLowerCase();
  const PROFANITY = ['shit','fuck','damn','ass','bitch','crap','bastard'];
  if (PROFANITY.some(w => lower.includes(w))) return '__PROFANITY__';
  return transcript;
}

function toggleMic() {
  if (S.aiThinking) return;
  if (S.isSpeaking) return;  // TTS 말하는 중엔 무시
  if (S.recActive) {
    stopListening();
  } else {
    S.micPressedAt = Date.now();
    startListening();
  }
}

function startListening() {
  if (!S.recognition) {
    initSpeech();
    if (!S.recognition) return;
  }
  // 이미 실행 중이면 중단 후 재시작
  if (S.recActive) {
    try { S.recognition.stop(); } catch(e) {}
    setTimeout(() => _doStart(), 200);
    return;
  }
  _doStart();
}

function _doStart() {
  if (!S.recognition) { initSpeech(); }
  setTimeout(() => {
    try {
      S.recognition.start();
    } catch(e) {
      // InvalidStateError 등 → 새 인스턴스로 재시도
      if (e.name === 'InvalidStateError' || e.name === 'NotSupportedError') {
        destroySpeech();
        initSpeech();
        setTimeout(() => {
          try { S.recognition.start(); }
          catch(e2) {
            setMicUI('idle');
            document.getElementById('voiceHint').textContent = '다시 눌러보세요!';
          }
        }, 200);
      }
    }
  }, 80);
}

function stopListening() {
  if (S.recognition && S.recActive) {
    try { S.recognition.stop(); } catch(e) {}
  }
}

function retryMic() {
  document.getElementById('retryBtn').classList.remove('show');
  S.gotFinal = false;
  startListening();
}
function setMicUI(state) {
  const btn=document.getElementById('micBtn');
  btn.className='mic-btn';
  if (state==='listening'){btn.classList.add('listening');btn.textContent='⏹';}
  else if (state==='disabled'){btn.classList.add('disabled');btn.textContent='🎤';}
  else btn.textContent='🎤';
}

// ═══════════════════════════════════════════════
//  TTS - emoji stripped
// ═══════════════════════════════════════════════
function speak(text) {
  if (!window.speechSynthesis) return;
  const clean = text.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{FE00}-\u{FE0F}]|[\u{1F000}-\u{1FFFF}]/gu,'').trim();
  if (!clean) return;

  // 기존 TTS 중단 + 마이크 차단
  window.speechSynthesis.cancel();
  stopListening();
  destroySpeech();
  S.isSpeaking = true;

  // Android: cancel() 직후 speak() 실패 방지 — 150ms 딜레이
  setTimeout(() => {
    if (window.speechSynthesis.paused) window.speechSynthesis.resume();
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.1; u.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google'))
           || voices.find(v => v.lang.startsWith('en-US'))
           || voices.find(v => v.lang.startsWith('en'));
    if (v) u.voice = v;
    u.onend = () => { S.isSpeaking = false; };
    u.onerror = () => { S.isSpeaking = false; };
    window.speechSynthesis.speak(u);
  }, 150);
}

// ═══════════════════════════════════════════════
//  AI SPEAK
// ═══════════════════════════════════════════════
function aiSpeak(text, phaseOverride) {
  S.aiThinking = false;
  S.aiSpokeAt = Date.now();
  addMessage('AI', text);
  S.history.push({speaker:'AI', text, timestamp:Date.now()});
  S.turns.push({turnNumber:S.turns.length+1, speaker:'AI', text, timestamp:Date.now()});
  if (S.phase === 'lesson') S.lessonHistory.push({speaker:'AI', text});
  speak(text);

  // TTS 길이 추정 + 잔향 대기 1500ms 추가 (갤탭 스피커 잔향이 마이크에 잡히는 것 방지)
  const estimatedMs = Math.max(2500, (text.length / 12) * 1000 * (1 / 0.85) + 1500);
  setTimeout(() => {
    S.isSpeaking = false;
    setMicUI('idle');
    document.getElementById('voiceHint').textContent = '마이크를 눌러 대답해 보세요!';
    if (S.phase === 'lesson') startScaffold();
  }, estimatedMs);
}

// ═══════════════════════════════════════════════
//  HANDLE STUDENT SPEECH
// ═══════════════════════════════════════════════
async function handleStudentSpeech(text) {
  if (!text||!text.trim()) return;
  if (text==='__PROFANITY__') {
    addMessage('STUDENT','...', true);
    setTimeout(()=>aiSpeak("I cannot understand that. Please try again."),400);
    return;
  }

  const now=Date.now();
  const latencyMs=Math.max(0,S.micPressedAt-S.aiSpokeAt);
  const durationMs=Math.max(100,now-S.speechStartAt);
  const words=text.trim().split(/\s+/).filter(Boolean);
  const wc=words.length;
  const wpm=Math.round((wc/Math.max(durationMs/1000,0.5))*60);
  const wpmGrade=wpm>130?'fast':wpm>80?'normal':wpm>40?'slow':'hesitant';

  S.studentTurnCount++;
  addMessage('STUDENT', text);
  document.getElementById('interimBar').textContent='말해보세요...';
  clearScaffold();

  if (S.phase==='lesson') {
    document.getElementById('turnBadge').textContent=`${S.studentTurnCount}턴`;
  } else if (S.phase==='free') {
    document.getElementById('turnBadge').textContent=`${S.studentTurnCount}턴`;
  }

  S.history.push({speaker:'STUDENT', text, timestamp:now});
  S.turns.push({turnNumber:S.turns.length+1, speaker:'STUDENT', text, timestamp:now, latencyMs, durationMs, wordCount:wc, wpm, wpmGrade});
  if (S.phase === 'lesson') S.lessonHistory.push({speaker:'STUDENT', text});

  setMicUI('disabled');
  document.getElementById('voiceHint').textContent='Alex가 생각하고 있어요...';
  showTyping();
  S.aiThinking=true;

  // Free talk end condition
  const freeEnd = S.phase==='free' && ['bye','그만','stop','끝','그만요'].some(w=>text.toLowerCase().includes(w));
  const freeTurnEnd = S.phase==='free' && S.studentTurnCount >= 10;

  const result = await callChat(S.phase);
  hideTyping();

  if (freeEnd || freeTurnEnd) {
    aiSpeak(result.success ? result.text : "Great job today! Bye bye!");
    setTimeout(finishFreetalk, 2800);
    return;
  }
  aiSpeak(result.success ? result.text : "Oh! Now ask me!");
}

function switchToLesson() {
  S.phase='lesson';
  S.history=[];
  S.lessonHistory=[];
  S.studentTurnCount=0;
  document.getElementById('messages').innerHTML='';
  updatePhaseUI();
  const opener = LESSON_OPENERS[S.lessonKey] || "Let's practice English!";
  setTimeout(()=> aiSpeak(opener), 600);
}

// ═══════════════════════════════════════════════
//  API CALLS
// ═══════════════════════════════════════════════
async function callChat(phase) {
  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        conversationHistory:S.history,
        lessonKey: phase==='free' ? 'FREE' : S.lessonKey,
        lessonTitle:S.lessonTitle,
        round:S.round,
        phase: phase || S.phase,
      }),
    });
    if (!res.ok) return {success:false};
    return await res.json();
  } catch(e) { return {success:false}; }
}

async function callComic(history, studentName) {
  try {
    const res = await fetch('/api/comic', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({conversationHistory:history, studentName}),
    });
    if (!res.ok) return {success:false};
    return await res.json();
  } catch(e) { return {success:false}; }
}

async function callSave(type, payload) {
  try {
    await fetch('/api/save', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({type, studentInfo:S.student, ...payload}),
    });
  } catch(e) { console.warn('Save failed:', e); }
}

function userEndLesson() {
  stopLessonTimer();

async function finishRound() {
  const endTime=Date.now();
  const durationSec=Math.round((endTime-S.sessionStart)/1000);
  const stTurns=S.turns.filter(t=>t.speaker==='STUDENT');
  const latencies=stTurns.map(t=>t.latencyMs||0).filter(v=>v>0);
  const wpms=stTurns.map(t=>t.wpm||0).filter(v=>v>0);
  const avgLat=latencies.length?Math.round(latencies.reduce((a,b)=>a+b,0)/latencies.length):0;
  const avgWpm=wpms.length?Math.round(wpms.reduce((a,b)=>a+b,0)/wpms.length):0;
  const wpmGrade=avgWpm>130?'fast':avgWpm>80?'normal':avgWpm>40?'slow':'hesitant';
  const summary={
    sessionId:S.sessionId, lessonKey:S.lessonKey, lessonTitle:S.lessonTitle,
    totalTurns:S.turns.length, studentTurns:stTurns.length,
    completed:true, completionRate:100,
    avgLatencyMs:avgLat, avgWpm, wpmGrade, scaffoldCount:0,
    startTime:new Date(S.sessionStart).toISOString(),
    endTime:new Date(endTime).toISOString(), durationSec,
  };

  if (S.round===1) {
    showScreen('comicLoadingScreen');
    const [comicResult] = await Promise.all([
      callComic(S.lessonHistory.length >= 4 ? S.lessonHistory : S.history, S.student.name),
      callSave('session',{sessionSummary:summary, turns:S.turns, round:S.round}),
    ]);
    showComicR1(comicResult.success?comicResult.comicData:null);
  } else {
    // Round 2 끝 → 만화 없이 바로 자유토크
    callSave('session',{sessionSummary:summary, turns:S.turns, round:S.round});
    beginFreetalk();
  }
}

function startRound2() {

  S.round=2; S.phase='lesson';

function beginFreetalk() {

  S.phase='free'; S.round='free';

  initSpeech();
  const freeopeners = [
    "Good job! By the way, I really like soccer. Do you play any sports?",
    "Nice work! I had ramen for lunch today. What did you eat?",
    "Well done! I have a cat at home. Do you have any pets?",
    "Great! I watched a fun movie yesterday. Do you like movies?",
    "Awesome! It is really hot today. What is the weather like where you are?",
  ];
  const freeopener = freeopeners[Math.floor(Math.random() * freeopeners.length)];

function userEndFreetalk() {
  stopListening();
  aiSpeak("Bye! You did a great job today! See you next time!");

async function finishFreetalk() {
  stopListening(); destroySpeech(); setMicUI('disabled');
  const endTime=Date.now();
  const durationSec=Math.round((endTime-S.sessionStart)/1000);
  const stTurns=S.turns.filter(t=>t.speaker==='STUDENT');
  const latencies=stTurns.map(t=>t.latencyMs||0).filter(v=>v>0);
  const wpms=stTurns.map(t=>t.wpm||0).filter(v=>v>0);
  const freetalkSummary={
    sessionId:S.sessionId,
    firstStudentText:stTurns[0]?.text||'',
    totalTurns:S.turns.length, studentTurns:stTurns.length,
    avgWpm:wpms.length?Math.round(wpms.reduce((a,b)=>a+b,0)/wpms.length):0,
    avgLatencyMs:latencies.length?Math.round(latencies.reduce((a,b)=>a+b,0)/latencies.length):0,
    selfCorrections:0, durationSec,
  };
  // 만화 생성 없이 바로 데이터 저장 후 완료 화면
  callSave('freetalk',{freetalkSummary, turns:S.turns});
  showScreen('comicScreen');
  document.getElementById('comicHdrTitle').textContent='오늘 연습 완료!';
  document.getElementById('comicHdrSub').textContent=`${S.student.name}, 정말 잘 했어요!`;
  document.getElementById('comicGrid').innerHTML='';
  document.getElementById('cdCard').style.display='none';
  document.getElementById('r2Btn').classList.remove('show');
  document.getElementById('freeBtn').classList.remove('show');
  document.getElementById('completeCard').classList.add('show');
}

  // 이미지 생성 만화
  if (comicData.isImageComic) {
    comicData.panels.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'comic-panel';
      if (p.imageData) {
        el.innerHTML = `
          <div class="panel-header"><span>Scene ${i+1}</span></div>
          <div style="position:relative">
            <img src="${p.imageData}" style="width:100%;display:block" alt="Scene ${i+1}"/>
            <div style="position:absolute;top:0;left:0;right:0;padding:6px;display:flex;justify-content:space-between;gap:4px;pointer-events:none">
              ${p.alexSays ? `<div style="background:rgba(232,235,255,0.92);border:2px solid #4A5BE8;border-radius:10px;padding:5px 8px;font-size:.85rem;font-weight:800;color:#1A1F5E;max-width:47%;line-height:1.4;flex-shrink:0">${p.alexSays}</div>` : '<div></div>'}
              ${p.studentSays ? `<div style="background:rgba(255,243,224,0.92);border:2px solid #FF6B35;border-radius:10px;padding:5px 8px;font-size:.85rem;font-weight:800;color:#BF360C;max-width:47%;line-height:1.4;text-align:right;flex-shrink:0">${p.studentSays}</div>` : '<div></div>'}
            </div>
          </div>`;
      } else {
        el.innerHTML = `
          <div class="panel-header"><span>Scene ${i+1}</span></div>
          <div style="padding:20px;text-align:center;color:#999;font-size:.8rem">${p.scene || 'Scene ' + (i+1)}</div>`;
      }
      grid.appendChild(el);
    });
    return;
  }

  // 기존 SVG 만화 (fallback)
  const studentName = S.student?.name || 'You';
  comicData.panels.forEach((p, i) => {
    const setting = p.setting || p.background || 'classroom';
    const alexEmotion = p.alexEmotion || p.alexMood || 'happy';
    const stuEmotion  = p.studentEmotion || p.studentMood || 'happy';
    const alexText    = p.alexSays || '';
    const stuText     = p.studentSays || '';
    const W = 220, H = 160;
    const alexLines = alexText ? Math.ceil(alexText.length / 14) : 0;
    const stuLines  = stuText  ? Math.ceil(stuText.length  / 14) : 0;
    const bubbleH   = Math.max(alexLines, stuLines) * 13 + 18;
    const charY     = bubbleH + 6;
    const svgContent = `
      ${drawBackground(setting, W, H)}
      ${alexText ? speechBubble(8, 4, 96, alexText, 'left', '#E8EBFF', '#1A1F5E') : ''}
      ${stuText  ? speechBubble(W-8, 4, 96, stuText, 'right', '#FFF3E0', '#BF360C') : ''}
      ${drawAlex(10, charY, alexEmotion)}
      ${drawStudent(W-110, charY, stuEmotion, studentName)}
    `;
    const el = document.createElement('div');
    el.className = 'comic-panel';
    el.innerHTML = `
      <div class="panel-header">
        <span>Scene ${i+1}</span>
        <span class="panel-setting">${setting}</span>
      </div>
      <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block">
        ${svgContent}
      </svg>`;
    grid.appendChild(el);
  });
}

function startCountdown(sec, onDone) {
  if (S.countdownInterval) clearInterval(S.countdownInterval);
  let remaining=sec;
  document.getElementById('cdNum').textContent=remaining;
  document.getElementById('cdFill').style.width='100%';
  S.countdownInterval=setInterval(()=>{
    remaining--;
    document.getElementById('cdNum').textContent=remaining;
    document.getElementById('cdFill').style.width=(remaining/sec*100)+'%';
    if (remaining<=0){
      clearInterval(S.countdownInterval); S.countdownInterval=null;
      if (onDone) onDone();
    }
  },1000);
}

// ═══════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════
function addMessage(speaker, text, isProfanity=false) {
  const c=document.getElementById('messages');
  const row=document.createElement('div');
  row.className=`msg-row ${speaker==='AI'?'ai':'student'}`;
  const displayText=isProfanity?'(다시 말해 보세요)':text;
  const time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  row.innerHTML=`
    <div class="msg-av ${speaker==='AI'?'ai-av':'st-av'}">${speaker==='AI'?'🤖':'👦'}</div>
    <div class="bubble ${speaker==='AI'?'ai':'student'}">
      ${displayText}
      <div class="bubble-time">${time}</div>
    </div>`;
  c.appendChild(row);
  c.scrollTop=c.scrollHeight;
}
function showTyping(){
  const c=document.getElementById('messages');
  const row=document.createElement('div');
  row.className='typing-row';row.id='typingRow';
  row.innerHTML=`<div class="msg-av ai-av">🤖</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  c.appendChild(row);c.scrollTop=c.scrollHeight;
}
function hideTyping(){const e=document.getElementById('typingRow');if(e)e.remove();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
