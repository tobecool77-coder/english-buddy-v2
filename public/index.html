<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>English Speaking Buddy 🎤</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --blue:#4A5BE8;--blue-dark:#3347CC;--blue-light:#E8EBFF;
  --mint:#22C9D8;--orange:#FF6B35;--yellow:#FFD23F;
  --green:#2ECC71;--red:#E74C3C;
  --bg:#F0F2FF;--white:#FFFFFF;--text:#1A1F5E;--sub:#6B7280;
  --shadow:0 4px 20px rgba(74,91,232,0.15);
  --radius:20px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text)}

/* ── SCREENS ─────────────────────────────────────────── */
.screen{display:none;width:100%;height:100%;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* ── TOAST ───────────────────────────────────────────── */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);
  background:rgba(26,31,94,.9);color:#fff;padding:10px 22px;border-radius:30px;
  font-size:.85rem;font-weight:700;opacity:0;transition:all .3s;z-index:9999;
  pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════ */
#loginScreen{
  background:linear-gradient(150deg,#3347CC 0%,#4A5BE8 45%,#22C9D8 100%);
  align-items:center;justify-content:center;padding:16px;
  position:relative;overflow:hidden;
}
.bg-circle{position:absolute;border-radius:50%;opacity:.08;pointer-events:none}
.bg-circle.c1{width:300px;height:300px;background:#fff;top:-80px;right:-60px}
.bg-circle.c2{width:200px;height:200px;background:#fff;bottom:-40px;left:-40px}
.bg-circle.c3{width:150px;height:150px;background:#FFD23F;top:40%;left:20%}

.login-card{
  background:#fff;border-radius:28px;padding:28px 24px;
  width:100%;max-width:440px;
  box-shadow:0 24px 60px rgba(0,0,0,.2);
  position:relative;z-index:1;
  max-height:calc(100vh - 32px);overflow-y:auto;
}
.brand{text-align:center;margin-bottom:22px}
.brand-robot{
  width:80px;height:80px;margin:0 auto 10px;
  background:linear-gradient(135deg,var(--blue),var(--mint));
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:38px;box-shadow:0 8px 24px rgba(74,91,232,.35);
  animation:roboPulse 2.5s ease-in-out infinite;
}
@keyframes roboPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.brand-title{font-family:'Fredoka One',cursive;font-size:1.7rem;color:var(--text);line-height:1.1}
.brand-sub{font-size:.82rem;color:var(--sub);margin-top:3px}

.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.form-grid-1{margin-bottom:12px}
.form-label{display:block;font-size:.72rem;font-weight:900;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-input,.form-select{
  width:100%;padding:11px 13px;
  border:2.5px solid #D1D5F5;border-radius:12px;
  font-size:.95rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--text);
  background:#F8F9FF;outline:none;
  -webkit-appearance:none;appearance:none;transition:border-color .2s,box-shadow .2s;
}
.form-input:focus,.form-select:focus{border-color:var(--blue);background:#fff;box-shadow:0 0 0 4px rgba(74,91,232,.12)}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--blue);font-size:.85rem;pointer-events:none}
.start-wrap{display:flex;justify-content:center;margin-top:16px}
.start-btn{
  width:82px;height:82px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--mint));
  color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  box-shadow:0 8px 28px rgba(74,91,232,.4);transition:transform .2s,box-shadow .2s;
}
.start-btn:active{transform:scale(.95);box-shadow:0 4px 14px rgba(74,91,232,.4)}
.start-btn .icon{font-size:1.7rem}
.start-btn .label{font-family:'Fredoka One',cursive;font-size:.8rem}

/* ══════════════════════════════════════════════════════
   CHAT SCREEN
══════════════════════════════════════════════════════ */
#chatScreen{background:var(--bg)}

.chat-header{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue));
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;box-shadow:0 3px 12px rgba(0,0,0,.15);
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-avatar{
  width:42px;height:42px;background:rgba(255,255,255,.2);
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;
}
.hdr-name{font-family:'Fredoka One',cursive;color:#fff;font-size:1.05rem}
.hdr-status{font-size:.72rem;color:rgba(255,255,255,.8);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge{padding:4px 11px;border-radius:20px;font-size:.75rem;font-weight:800}
.badge-round{background:rgba(255,255,255,.2);color:#fff}
.badge-turn{background:var(--yellow);color:#333}
.badge-free{background:var(--orange);color:#fff}

.messages{flex:1;overflow-y:auto;padding:14px 14px 8px;display:flex;flex-direction:column;gap:12px}
.msg-row{display:flex;align-items:flex-end;gap:8px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.ai{flex-direction:row}
.msg-row.student{flex-direction:row-reverse}
.msg-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.msg-av.ai-av{background:linear-gradient(135deg,var(--blue),var(--mint))}
.msg-av.st-av{background:linear-gradient(135deg,var(--orange),var(--yellow))}
.bubble{
  max-width:72%;padding:11px 14px;border-radius:18px;
  font-size:.95rem;font-weight:600;line-height:1.5;
}
.bubble.ai{background:#fff;color:var(--text);border-bottom-left-radius:4px;box-shadow:var(--shadow)}
.bubble.student{background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:#fff;border-bottom-right-radius:4px}
.bubble-time{font-size:.65rem;opacity:.5;margin-top:3px}

.typing-row{display:flex;align-items:flex-end;gap:8px}
.typing-bubble{
  background:#fff;border-radius:18px;border-bottom-left-radius:4px;
  padding:12px 16px;display:flex;gap:5px;align-items:center;box-shadow:var(--shadow);
}
.dot{width:7px;height:7px;background:var(--blue);border-radius:50%;animation:dotBounce 1.1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes dotBounce{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.1);opacity:1}}

.interim-bar{
  padding:8px 16px;font-size:.88rem;font-style:italic;color:var(--blue);
  background:rgba(74,91,232,.07);min-height:36px;flex-shrink:0;
  border-left:3px solid var(--blue);margin:0 14px 6px;border-radius:0 8px 8px 0;
}

.scaffold-bar{
  display:none;margin:0 14px 6px;padding:10px 14px;
  background:linear-gradient(135deg,#FFF8E1,#FFECB3);
  border:2px solid var(--yellow);border-radius:12px;
  font-size:.85rem;font-weight:700;color:#5D4037;flex-shrink:0;
}
.scaffold-bar.show{display:block}

.voice-panel{
  padding:12px 16px 18px;background:#fff;
  border-top:1px solid #E8EBFF;flex-shrink:0;
  box-shadow:0 -3px 16px rgba(0,0,0,.06);
}
.voice-hint{text-align:center;font-size:.8rem;font-weight:700;color:var(--sub);margin-bottom:10px;min-height:18px}
.wave{display:flex;align-items:center;justify-content:center;gap:3px;height:28px;margin-bottom:8px}
.wbar{width:4px;background:var(--blue);border-radius:4px;transition:height .1s;height:4px}
.wave.active .wbar{animation:waveAnim 1s ease-in-out infinite}
.wbar:nth-child(1){animation-delay:0s}.wbar:nth-child(2){animation-delay:.1s}
.wbar:nth-child(3){animation-delay:.2s}.wbar:nth-child(4){animation-delay:.3s}
.wbar:nth-child(5){animation-delay:.2s}.wbar:nth-child(6){animation-delay:.1s}
.wbar:nth-child(7){animation-delay:0s}
@keyframes waveAnim{0%,100%{height:4px}50%{height:22px}}
.mic-btn{
  width:72px;height:72px;border-radius:50%;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--mint));
  color:#fff;font-size:1.8rem;display:flex;align-items:center;justify-content:center;
  margin:0 auto;box-shadow:0 6px 22px rgba(74,91,232,.4);
  transition:transform .15s,box-shadow .15s;
  -webkit-user-select:none;user-select:none;
}
.mic-btn:active{transform:scale(.93)}
.mic-btn.listening{background:linear-gradient(135deg,var(--red),#FF8A65);animation:micPulse 1.2s ease-in-out infinite}
.mic-btn.disabled{background:#CFD8DC;box-shadow:none;cursor:not-allowed;opacity:.7}
@keyframes micPulse{0%{box-shadow:0 0 0 0 rgba(231,76,60,.5)}70%{box-shadow:0 0 0 18px rgba(231,76,60,0)}100%{box-shadow:0 0 0 0 rgba(231,76,60,0)}}
.mic-label{text-align:center;font-size:.72rem;color:var(--sub);margin-top:6px;font-weight:700}
.btn-row{display:flex;justify-content:center;gap:10px;margin-top:8px}
.retry-btn,.end-free-btn{
  padding:8px 18px;border-radius:20px;border:none;cursor:pointer;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;
  transition:transform .15s;display:none;
}
.retry-btn.show{display:block}
.end-free-btn.show{display:block}
.retry-btn{background:var(--blue-light);color:var(--blue-dark)}
.end-free-btn{background:linear-gradient(135deg,var(--orange),#FF4500);color:#fff;box-shadow:0 4px 12px rgba(255,107,53,.35)}
.retry-btn:active,.end-free-btn:active{transform:scale(.95)}

/* ══════════════════════════════════════════════════════
   COMIC LOADING
══════════════════════════════════════════════════════ */
#comicLoadingScreen{
  background:linear-gradient(150deg,#1A1F5E,#3347CC,#4A5BE8);
  align-items:center;justify-content:center;padding:20px;text-align:center;
}
.loading-inner{color:#fff;max-width:340px}
.loading-emoji{font-size:72px;animation:drawing 1.5s ease-in-out infinite}
@keyframes drawing{0%,100%{transform:rotate(-6deg) scale(1)}50%{transform:rotate(6deg) scale(1.1)}}
.loading-title{font-family:'Fredoka One',cursive;font-size:1.7rem;margin:12px 0 6px}
.loading-sub{font-size:.92rem;opacity:.85;margin-bottom:24px}
.loading-track{background:rgba(255,255,255,.15);border-radius:10px;height:9px;overflow:hidden}
.loading-fill{height:100%;background:linear-gradient(90deg,var(--mint),var(--yellow));border-radius:10px;animation:loadFill 3s ease-in-out infinite}
@keyframes loadFill{0%{width:8%}50%{width:88%}100%{width:8%}}

/* ══════════════════════════════════════════════════════
   COMIC SCREEN
══════════════════════════════════════════════════════ */
#comicScreen{background:linear-gradient(150deg,#E8EBFF,#E0FAFA)}

.comic-header{
  background:linear-gradient(135deg,var(--blue-dark),var(--blue));
  padding:13px 16px;text-align:center;color:#fff;flex-shrink:0;
}
.comic-header-title{font-family:'Fredoka One',cursive;font-size:1.3rem}
.comic-header-sub{font-size:.78rem;opacity:.85;margin-top:2px}

.comic-body{flex:1;overflow-y:auto;padding:14px 14px 20px}

.comic-title-card{
  background:#fff;border-radius:16px;padding:12px 18px;margin-bottom:14px;
  text-align:center;box-shadow:var(--shadow);
}
.comic-title{font-family:'Fredoka One',cursive;font-size:1.2rem;color:var(--text)}
.comic-student{font-size:.78rem;color:var(--sub);margin-top:3px}

.comic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.comic-panel{
  background:#fff;border-radius:14px;overflow:hidden;
  border:3px solid #C5CAE9;box-shadow:var(--shadow);
  animation:panelIn .4s ease forwards;opacity:0;
}
.comic-panel:nth-child(1){animation-delay:.05s}
.comic-panel:nth-child(2){animation-delay:.12s}
.comic-panel:nth-child(3){animation-delay:.19s}
.comic-panel:nth-child(4){animation-delay:.26s}
@keyframes panelIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
.panel-tag{background:var(--blue);color:#fff;font-size:.7rem;font-weight:800;padding:2px 9px}
.panel-svg{width:100%;display:block}
.panel-talk{padding:7px 8px;border-top:2px solid #E8EBFF;display:flex;flex-direction:column;gap:4px}
.talk-line{display:flex;align-items:flex-start;gap:5px;font-size:.72rem;line-height:1.4}
.who{font-weight:900;padding:1px 5px;border-radius:6px;font-size:.66rem;flex-shrink:0;margin-top:1px}
.who.alex{background:#E8EBFF;color:var(--blue-dark)}
.who.student{background:#E0FAFA;color:#007A85}
.said{font-weight:600;color:var(--text);font-style:italic}

.countdown-card{
  background:#fff;border-radius:16px;padding:16px 18px;
  text-align:center;box-shadow:var(--shadow);margin-bottom:14px;
}
.cd-title{font-size:.85rem;font-weight:700;color:var(--sub);margin-bottom:6px}
.cd-number{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--blue);line-height:1}
.cd-label{font-size:.78rem;color:var(--sub);margin-top:4px}
.r2-btn{
  width:100%;padding:15px;border:none;border-radius:16px;cursor:pointer;
  background:linear-gradient(135deg,var(--orange),#FF4500);color:#fff;
  font-family:'Fredoka One',cursive;font-size:1.05rem;
  box-shadow:0 6px 20px rgba(255,107,53,.4);
  display:none;margin-bottom:12px;transition:transform .15s;
}
.r2-btn.show{display:block}
.r2-btn:active{transform:scale(.97)}

.complete-card{
  background:linear-gradient(135deg,#E8F5E9,#F3E5F5);
  border-radius:20px;padding:22px 18px;text-align:center;
  border:2.5px solid #C8E6C9;display:none;
}
.complete-card.show{display:block}
.complete-emoji{font-size:52px;margin-bottom:10px}
.complete-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--text);margin-bottom:6px}
.complete-sub{font-size:.88rem;color:var(--sub);line-height:1.6}
</style>
</head>
<body>
<div id="toast"></div>

<!-- ═══════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════ -->
<div class="screen active" id="loginScreen">
  <div class="bg-circle c1"></div>
  <div class="bg-circle c2"></div>
  <div class="bg-circle c3"></div>
  <div class="login-card">
    <div class="brand">
      <div class="brand-robot">🤖</div>
      <div class="brand-title">English Speaking Buddy</div>
      <div class="brand-sub">AI 영어 말하기 연습 🎤</div>
    </div>
    <!-- Grade + Class + Number -->
    <div class="form-grid-3">
      <div>
        <label class="form-label">학년</label>
        <div class="select-wrap">
          <select class="form-select" id="grade" onchange="onGradeChange()">
            <option value="">-</option>
            <option value="5">5학년</option>
            <option value="6">6학년</option>
          </select>
        </div>
      </div>
      <div>
        <label class="form-label">반</label>
        <div class="select-wrap">
          <select class="form-select" id="classNum">
            <option value="">-</option>
            <option value="1">1반</option><option value="2">2반</option>
            <option value="3">3반</option><option value="4">4반</option>
            <option value="5">5반</option><option value="6">6반</option>
          </select>
        </div>
      </div>
      <div>
        <label class="form-label">번호</label>
        <input type="number" class="form-input" id="number" placeholder="00" min="1" max="40">
      </div>
    </div>
    <!-- Name -->
    <div class="form-grid-1">
      <label class="form-label">이름</label>
      <input type="text" class="form-input" id="name" placeholder="이름을 입력하세요">
    </div>
    <!-- Lesson dropdown -->
    <div class="form-grid-1">
      <label class="form-label">오늘의 단원</label>
      <div class="select-wrap">
        <select class="form-select" id="lessonSelect">
          <option value="">먼저 학년을 선택하세요</option>
        </select>
      </div>
    </div>
    <div class="start-wrap">
      <button class="start-btn" onclick="startSession()">
        <span class="icon">🎤</span>
        <span class="label">시작!</span>
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     CHAT SCREEN
═══════════════════════════════════════════════════ -->
<div class="screen" id="chatScreen">
  <div class="chat-header">
    <div class="hdr-left">
      <div class="hdr-avatar">🤖</div>
      <div>
        <div class="hdr-name">Alex</div>
        <div class="hdr-status" id="hdrStatus">Ready! 🌟</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="badge badge-round" id="roundBadge">Round 1</div>
      <div class="badge badge-turn" id="turnBadge">0 / 6</div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="interim-bar" id="interimBar">🎤 말해보세요...</div>
  <div class="scaffold-bar" id="scaffoldBar"></div>
  <div class="voice-panel">
    <div class="voice-hint" id="voiceHint">마이크 버튼을 눌러 말해보세요 🎤</div>
    <div class="wave" id="wave">
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div><div class="wbar"></div><div class="wbar"></div>
      <div class="wbar"></div>
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
    <div class="mic-label" id="micLabel">버튼을 누르고 영어로 말하세요!</div>
    <div class="btn-row">
      <button class="retry-btn" id="retryBtn" onclick="retryMic()">🔄 다시 말하기</button>
      <button class="end-free-btn" id="endFreeBtn" onclick="userEndFreetalk()">✋ Bye! 그만할게요</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     COMIC LOADING
═══════════════════════════════════════════════════ -->
<div class="screen" id="comicLoadingScreen">
  <div class="loading-inner">
    <div class="loading-emoji">🎨</div>
    <div class="loading-title">만화를 그리고 있어요!</div>
    <div class="loading-sub">잠시만 기다려 주세요 😊</div>
    <div class="loading-track"><div class="loading-fill"></div></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     COMIC SCREEN
═══════════════════════════════════════════════════ -->
<div class="screen" id="comicScreen">
  <div class="comic-header">
    <div class="comic-header-title" id="comicHdrTitle">📖 My English Comic!</div>
    <div class="comic-header-sub" id="comicHdrSub">오늘의 대화를 만화로 만들었어요 🎨</div>
  </div>
  <div class="comic-body">
    <div class="comic-title-card">
      <div class="comic-title" id="comicTitle">My English Story</div>
      <div class="comic-student" id="comicStudentInfo"></div>
    </div>
    <div class="comic-grid" id="comicGrid"></div>
    <div class="countdown-card" id="cdCard">
      <div class="cd-title">⏰ Round 2 시작까지</div>
      <div class="cd-number" id="cdNum">120</div>
      <div class="cd-label">초 남았어요 · 만화를 읽으면서 연습해 보세요!</div>
    </div>
    <button class="r2-btn" id="r2Btn" onclick="startRound2()">🚀 Round 2 시작! Let's Go Again!</button>
    <div class="complete-card" id="completeCard">
      <div class="complete-emoji">🎉</div>
      <div class="complete-title">오늘 연습 완료!</div>
      <div class="complete-sub">정말 잘 했어요!<br>Great job today! ⭐</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  LESSON DATA
// ═══════════════════════════════════════════════════════════
const LESSONS = {
  5: [
    {key:'5-1', title:'Lesson 1 · Where Are You From?'},
    {key:'5-2', title:'Lesson 2 · What Are These?'},
    {key:'5-3', title:'Lesson 3 · Can I Take Pictures?'},

// ═══════════════════════════════════════════════════════════
//  SPEECH RECOGNITION  (Galaxy Tab / Android Chrome optimized)
// ═══════════════════════════════════════════════════════════
function initSpeech() {
  destroySpeech();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('⚠️ Chrome 브라우저를 사용해 주세요!'); return; }

  const r = new SR();
  r.lang = 'en-US';
  r.continuous = false;       // Android에서 continuous=true는 불안정
  r.interimResults = true;
  r.maxAlternatives = 3;

  r.onstart = () => {
    S.recActive = true; S.gotFinal = false; S.speechStartAt = Date.now();
    setMicUI('listening');
    document.getElementById('voiceHint').textContent = '🔴 듣고 있어요... 영어로 말해보세요!';
    document.getElementById('wave').classList.add('active');
    document.getElementById('interimBar').textContent = '🎤 말해보세요...';
    document.getElementById('retryBtn').classList.remove('show');
    clearScaffold();
  };

  r.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        final = bestTranscript(e.results[i]);
        S.gotFinal = true;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    if (interim) document.getElementById('interimBar').textContent = '💬 ' + interim + '...';
    if (final)   { document.getElementById('interimBar').textContent = '✅ ' + final; handleStudentSpeech(final); }
  };

  r.onend = () => {
    S.recActive = false;
    document.getElementById('wave').classList.remove('active');
    if (!S.aiThinking) {
      setMicUI('idle');
      if (!S.gotFinal) {
        document.getElementById('voiceHint').textContent = '잘 안 들렸어요. 다시 눌러보세요! 😊';
        document.getElementById('retryBtn').classList.add('show');
      }
    }
  };

  r.onerror = (e) => {
    S.recActive = false;
    document.getElementById('wave').classList.remove('active');
    setMicUI('idle');
    const msgs = {
      'no-speech':    '소리가 없었어요. 다시 눌러보세요! 🎤',
      'not-allowed':  '마이크 권한이 필요해요!',
      'network':      '네트워크 오류. 다시 눌러보세요!',
      'audio-capture':'마이크를 찾을 수 없어요!',
    };
    document.getElementById('voiceHint').textContent = msgs[e.error] || '다시 눌러보세요!';
    document.getElementById('retryBtn').classList.add('show');
  };

  S.recognition = r;
}

function destroySpeech() {
  if (S.recognition) {
    try { S.recognition.abort(); } catch(e) {}
    S.recognition = null;
    S.recActive = false;
  }
}

function bestTranscript(result) {
  let best = result[0].transcript, bestConf = result[0].confidence || 0;
  for (let i = 1; i < result.length; i++) {
    const c = result[i].confidence || 0;
    if (c > bestConf) { best = result[i].transcript; bestConf = c; }
  }
  const lower = best.toLowerCase();
  if (PROFANITY.some(w => lower.includes(w))) return '__PROFANITY__';
  // Noise confidence filter — very low confidence → treat as noise
  if (bestConf > 0 && bestConf < 0.15) return '';
  return best.trim();
}

function toggleMic() {
  if (S.aiThinking) return;
  if (S.recActive) {
    stopListening();
  } else {
    S.micPressedAt = Date.now();
    startListening();
  }
}

function startListening() {
  if (!S.recognition) { initSpeech(); if (!S.recognition) return; }
  if (S.recActive) { destroySpeech(); initSpeech(); }
  try {
    S.recognition.start();
  } catch (e) {
    // If already started, recreate
    destroySpeech(); initSpeech();
    setTimeout(() => { try { S.recognition.start(); } catch(e2) {} }, 200);
  }
}

function stopListening() {
  if (S.recognition && S.recActive) {
    try { S.recognition.stop(); } catch(e) {}
  }
}

function retryMic() {
  document.getElementById('retryBtn').classList.remove('show');
  S.gotFinal = false;
  destroySpeech(); initSpeech();
  setTimeout(startListening, 150);
}

function setMicUI(state) {
  const btn = document.getElementById('micBtn');
  btn.className = 'mic-btn';
  if (state === 'listening') { btn.classList.add('listening'); btn.textContent = '⏹'; }
  else if (state === 'disabled') { btn.classList.add('disabled'); btn.textContent = '🎤'; }
  else btn.textContent = '🎤';
}

// ═══════════════════════════════════════════════════════════
//  TTS
// ═══════════════════════════════════════════════════════════
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85; u.pitch = 1.1; u.volume = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(v => v.lang.startsWith('en') && v.name.toLowerCase().includes('google'))
         || voices.find(v => v.lang.startsWith('en-US'))
         || voices.find(v => v.lang.startsWith('en'));
  if (v) u.voice = v;
  window.speechSynthesis.speak(u);
}

//  AI SPEAK
// ═══════════════════════════════════════════════════════════
function aiSpeak(text) {
  S.aiThinking = false;
  S.aiSpokeAt = Date.now();
  addMessage('AI', text);
  S.history.push({ speaker: 'AI', text, timestamp: Date.now() });
  S.turns.push({ turnNumber: S.turns.length + 1, speaker: 'AI', text, timestamp: Date.now() });
  speak(text);
  setTimeout(() => {
    setMicUI('idle');
    document.getElementById('voiceHint').textContent = '마이크를 눌러 대답해 보세요! 🎤';
    if (S.round !== 'free') startScaffold();
    else startScaffold();
  }, 1400);
}

// ═══════════════════════════════════════════════════════════
//  HANDLE STUDENT SPEECH
// ═══════════════════════════════════════════════════════════
async function handleStudentSpeech(text) {
  if (!text || !text.trim()) return;

  // Profanity
  if (text === '__PROFANITY__') {
    addMessage('STUDENT', '...', true);
    setTimeout(() => aiSpeak("I cannot understand that. Please try again! 😊"), 400);
    return;
  }

  const now = Date.now();
  const latencyMs  = Math.max(0, S.micPressedAt - S.aiSpokeAt);
  const durationMs = Math.max(100, now - S.speechStartAt);
  const words = text.trim().split(/\s+/).filter(Boolean);
  const wc = words.length;
  const wpm = Math.round((wc / Math.max(durationMs / 1000, 0.5)) * 60);
  const wpmGrade = wpm > 130 ? 'fast' : wpm > 80 ? 'normal' : wpm > 40 ? 'slow' : 'hesitant';

  S.studentTurnCount++;
  addMessage('STUDENT', text);
  document.getElementById('interimBar').textContent = '🎤 말해보세요...';
  clearScaffold();

  // Update turn counter badge
  if (S.round !== 'free') {
    document.getElementById('turnBadge').textContent = `${S.studentTurnCount} / ${MAX_STUDENT_TURNS}`;
  }

  S.history.push({ speaker: 'STUDENT', text, timestamp: now });
  S.turns.push({
    turnNumber: S.turns.length + 1, speaker: 'STUDENT', text, timestamp: now,
    latencyMs, durationMs, wordCount: wc, wpm, wpmGrade,
  });

  // UI: thinking
  setMicUI('disabled');
  document.getElementById('voiceHint').textContent = 'Alex가 생각하고 있어요... 💭';
  showTyping();
  S.aiThinking = true;

  // Check end conditions BEFORE calling AI
  const shouldEndRound = S.round !== 'free' && S.studentTurnCount >= MAX_STUDENT_TURNS;
  const shouldEndFree  = S.round === 'free'  && S.studentTurnCount >= MAX_FREE_TURNS;
  const freeEnd = S.round === 'free' && ['bye','그만','stop','끝','그만요'].some(w => text.toLowerCase().includes(w));

  // Call AI
  const result = await callChat();
  hideTyping();

  if (!result.success) {
    S.aiThinking = false;
    aiSpeak("Sorry, can you try again? 😊");
    return;
  }

  if (freeEnd) {
    aiSpeak(result.text);
    setTimeout(finishFreetalk, 2800);
    return;
  }
  if (shouldEndFree) {
    aiSpeak(result.text);
    setTimeout(finishFreetalk, 2800);
    return;
  }
  if (shouldEndRound) {
    aiSpeak(result.text);
    setTimeout(finishRound, 2800);
    return;
  }
  aiSpeak(result.text);
}

// ═══════════════════════════════════════════════════════════
//  API CALLS
// ═══════════════════════════════════════════════════════════
async function callChat() {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        conversationHistory: S.history,
        lessonKey: S.round === 'free' ? 'FREE' : S.lessonKey,
        lessonTitle: S.lessonTitle,
        round: S.round,
      }),
    });
    if (!res.ok) return { success: false };
    return await res.json();
  } catch (e) {
    console.error('callChat error:', e);
    return { success: false };
  }
}

async function callComic(history, studentName) {
  try {
    const res = await fetch('/api/comic', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversationHistory: history, studentName }),
    });
    if (!res.ok) return { success: false };
    return await res.json();
  } catch (e) { return { success: false }; }
}

async function callSave(type, payload) {
  try {
    await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, studentInfo: S.student, ...payload }),
    });
  } catch (e) { console.warn('Save failed (non-critical):', e); }
}

// ═══════════════════════════════════════════════════════════
//  ROUND FLOW
// ═══════════════════════════════════════════════════════════
async function finishRound() {
  stopListening();
  destroySpeech();
  setMicUI('disabled');
  const endTime = Date.now();
  const durationSec = Math.round((endTime - S.sessionStart) / 1000);
  const stTurns = S.turns.filter(t => t.speaker === 'STUDENT');
  const latencies = stTurns.map(t => t.latencyMs || 0).filter(v => v > 0);
  const wpms = stTurns.map(t => t.wpm || 0).filter(v => v > 0);
  const avgLat = latencies.length ? Math.round(latencies.reduce((a,b)=>a+b,0)/latencies.length) : 0;
  const avgWpm = wpms.length ? Math.round(wpms.reduce((a,b)=>a+b,0)/wpms.length) : 0;
  const wpmGrade = avgWpm > 130 ? 'fast' : avgWpm > 80 ? 'normal' : avgWpm > 40 ? 'slow' : 'hesitant';

  const summary = {
    sessionId: S.sessionId, lessonKey: S.lessonKey, lessonTitle: S.lessonTitle,
    totalTurns: S.turns.length, studentTurns: stTurns.length,
    completed: stTurns.length >= MAX_STUDENT_TURNS,
    completionRate: Math.min(100, Math.round(stTurns.length / MAX_STUDENT_TURNS * 100)),
    avgLatencyMs: avgLat, avgWpm, wpmGrade, scaffoldCount: 0,
    startTime: new Date(S.sessionStart).toISOString(),
    endTime: new Date(endTime).toISOString(), durationSec,
  };

  showScreen('comicLoadingScreen');

  // Parallel: generate comic + save data
  const [comicResult] = await Promise.all([
    callComic(S.history, S.student.name),
    callSave('session', { sessionSummary: summary, turns: S.turns, round: S.round }),
  ]);

  if (S.round === 1) {
    showComicR1(comicResult.success ? comicResult.comicData : null);
  } else {
    // Round 2 done → start Free Talk
    setTimeout(beginFreetalk, 1200);
  }
}

async function finishFreetalk() {
  stopListening(); destroySpeech();
  setMicUI('disabled');
  document.getElementById('endFreeBtn').classList.remove('show');

  const endTime = Date.now();
  const durationSec = Math.round((endTime - S.sessionStart) / 1000);
  const stTurns = S.turns.filter(t => t.speaker === 'STUDENT');
  const latencies = stTurns.map(t => t.latencyMs || 0).filter(v => v > 0);
  const wpms = stTurns.map(t => t.wpm || 0).filter(v => v > 0);

  const freetalkSummary = {
    sessionId: S.sessionId,
    firstStudentText: stTurns[0]?.text || '',
    totalTurns: S.turns.length, studentTurns: stTurns.length,
    avgWpm: wpms.length ? Math.round(wpms.reduce((a,b)=>a+b,0)/wpms.length) : 0,
    avgLatencyMs: latencies.length ? Math.round(latencies.reduce((a,b)=>a+b,0)/latencies.length) : 0,
    selfCorrections: S.freeSelfCorrections, durationSec,
  };

  showScreen('comicLoadingScreen');

  const [comicResult] = await Promise.all([
    callComic(S.history, S.student.name),
    callSave('freetalk', { freetalkSummary, turns: S.turns }),
  ]);

  showComicFinal(comicResult.success ? comicResult.comicData : null);
}

    const el = document.createElement('div');
    el.className = 'comic-panel';
    el.innerHTML = `
      <span class="panel-tag">Scene ${i+1}</span>
      ${panelSVG(p)}
      <div class="panel-talk">
        ${p.alexSays    ? `<div class="talk-line"><span class="who alex">Alex</span><span class="said">"${p.alexSays}"</span></div>` : ''}
        ${p.studentSays ? `<div class="talk-line"><span class="who student">You</span><span class="said">"${p.studentSays}"</span></div>` : ''}
      </div>`;
    grid.appendChild(el);
  });
}

function panelSVG(p) {

  const stuFace  = {happy:'😄',excited:'😃',thinking:'🤔',surprised:'😮',proud:'🥰'}[p.studentMood] || '😄';
  return `<svg viewBox="0 0 200 130" xmlns="http://www.w3.org/2000/svg" class="panel-svg">
    <rect width="200" height="130" fill="${bgColor}"/>
    <circle cx="52" cy="46" r="20" fill="#FFCCBC"/>
    <text x="52" y="54" text-anchor="middle" font-size="16">${alexFace}</text>
    <ellipse cx="52" cy="88" rx="17" ry="22" fill="#4A5BE8"/>
    <text x="52" y="120" text-anchor="middle" font-size="8" fill="#3347CC" font-weight="bold">Alex</text>
    <circle cx="148" cy="46" r="20" fill="#FFCCBC"/>
    <text x="148" y="54" text-anchor="middle" font-size="16">${stuFace}</text>
    <ellipse cx="148" cy="88" rx="17" ry="22" fill="#FF6B35"/>
    <text x="148" y="120" text-anchor="middle" font-size="8" fill="#BF360C" font-weight="bold">You</text>
  </svg>`;
}

function startCountdown() {
  let sec = 120;
  const el = document.getElementById('cdNum');
  el.textContent = sec;
  // Show R2 button after 30s too (early opt-in)
  setTimeout(() => document.getElementById('r2Btn').classList.add('show'), 30000);
  S.countdownInterval = setInterval(() => {
    sec--;
    el.textContent = sec;
    if (sec <= 0) {
      clearInterval(S.countdownInterval); S.countdownInterval = null;
      document.getElementById('cdCard').style.display = 'none';
      document.getElementById('r2Btn').classList.add('show');
    }
  }, 1000);
}

// ═══════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function addMessage(speaker, text, isProfanity = false) {
  const c = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = `msg-row ${speaker === 'AI' ? 'ai' : 'student'}`;
  const displayText = isProfanity ? '⚠️ (다시 말해 보세요)' : text;
  const time = new Date().toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
  row.innerHTML = `
    <div class="msg-av ${speaker === 'AI' ? 'ai-av' : 'st-av'}">${speaker === 'AI' ? '🤖' : '👦'}</div>
    <div class="bubble ${speaker === 'AI' ? 'ai' : 'student'}">
      ${displayText}
      <div class="bubble-time">${time}</div>
    </div>`;
  c.appendChild(row);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  const c = document.getElementById('messages');
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typingRow';
  row.innerHTML = `<div class="msg-av ai-av">🤖</div>
    <div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  c.appendChild(row); c.scrollTop = c.scrollHeight;
}
function hideTyping() { const e = document.getElementById('typingRow'); if(e) e.remove(); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  // Pre-load voices
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
  // Request mic permission early so there's no delay when session starts
  if (navigator.mediaDevices?.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ audio: true })
      .then(stream => { stream.getTracks().forEach(t => t.stop()); })
      .catch(e => { if (e.name === 'NotAllowedError') toast('⚠️ 마이크 권한을 허용해 주세요!'); });
  }
});
</script>
